<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulations - QuantumChem</title>
        rel="stylesheet">
    <script type="module" src="/simulations.ts"></script>
</head>

<body>
    <div id="simulations-app">
        <nav class="main-nav glass-panel">
            <div class="nav-brand">
              <svg class="brand-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
                <defs>
                  <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="70" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                <circle cx="100" cy="100" r="50" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                <circle cx="170" cy="100" r="4" fill="currentColor"/>
                <circle cx="30" cy="100" r="4" fill="currentColor"/>
                <circle cx="100" cy="100" r="10" fill="currentColor"/>
              </svg>
              <span class="brand-text">QuantumChem</span>
            </div>
            <button class="nav-toggle" aria-label="Toggle menu">☰</button>
            <ul class="nav-links">
                <li><a href="./">Home</a></li>
                <li><a href="lectures.html">Lectures</a></li>
                <li><a href="simulations.html" class="active">Simulations</a></li>
                <li><a href="#">Resources</a></li>
            </ul>
        </nav>

        <main class="simulations-section">
            <div class="hero-content glass-panel">
                <h1 class="hero-title">Interactive <span class="highlight">Simulations</span></h1>
                <p class="hero-subtitle">Browse our collection of quantum mechanics simulations organized by topic. Click on category descriptions to customize them.</p>
            </div>

            <div id="categories-container">
                <!-- Categories will be dynamically generated by simulations.ts -->
            </div>
        </main>

        <footer class="landing-footer">
            <p>&copy; 2026 QuantumChem. Educating the next generation of scientists.</p>
        </footer>
    </div>
  <script>
    document.querySelector('.hamburger').addEventListener('click', function () {
      var open = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', String(!open));
      this.classList.toggle('is-open');
      document.querySelector('.nav-links').classList.toggle('nav-open');
    });
  </script>
</body>

</html>
