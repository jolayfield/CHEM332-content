<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Particle in a Box — QuantumChem</title>
  <script type="module" crossorigin src="./assets/particlebox2d-DftDXIpS.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-DxoHAauW.js">
  <link rel="modulepreload" crossorigin href="./assets/theme-manager-DYMd5c2H.js">
  <link rel="stylesheet" crossorigin href="./assets/style-C8I79n8g.css">
</head>
<body>
  <div id="app">
    <nav class="main-nav sim-nav">
      <a class="nav-back" href="/simulations.html">‹ Back</a>
      <div class="nav-section byline">§ 2.2</div>
      <button class="nav-bookmark" aria-label="Bookmark">&#9734;</button>
    </nav>

    <div class="breadcrumb">
      <a href="./">Home</a><span class="sep">/</span>
      <a href="simulations.html">Simulations</a><span class="sep">/</span>
      <a href="particlebox.html">Particle in a Box</a><span class="sep">/</span>
      <span class="current">2D</span>
    </div>

    <header class="page-header">
      <div class="eyebrow">Chapter 02 · Section 2.2</div>
      <h1>2D Particle in a <i>Box.</i></h1>
    </header>

    <div class="fig-caption">Figure 2.3 · Contour Plot</div>
    <div class="sim-canvas-wrap dark">
      <canvas id="pbox2d-canvas"></canvas>
    </div>

    <div class="readouts">
      <div>
        <div class="k">Energy E</div>
        <div class="v" id="energy-val">2.0 E₁</div>
      </div>
      <div>
        <div class="k">Nodal X</div>
        <div class="v" id="nodes-x-val">0</div>
      </div>
      <div>
        <div class="k">Nodal Y</div>
        <div class="v" id="nodes-y-val">0</div>
      </div>
    </div>

    <div class="control-panel">
      <div class="control-group">
        <div class="control-row">
          <label for="quantum-nx">n<sub>x</sub></label>
          <span class="value-display" id="nx-val">n<sub>x</sub> = 1</span>
        </div>
        <input type="range" id="quantum-nx" class="qc-slider" min="1" max="8" value="1" step="1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="quantum-ny">n<sub>y</sub></label>
          <span class="value-display" id="ny-val">n<sub>y</sub> = 1</span>
        </div>
        <input type="range" id="quantum-ny" class="qc-slider" min="1" max="8" value="1" step="1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="box-lx">Box Width L<sub>x</sub></label>
          <span class="value-display" id="lx-val">1.0</span>
        </div>
        <input type="range" id="box-lx" class="qc-slider" min="0.5" max="3.0" value="1.0" step="0.1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="box-ly">Box Height L<sub>y</sub></label>
          <span class="value-display" id="ly-val">1.0</span>
        </div>
        <input type="range" id="box-ly" class="qc-slider" min="0.5" max="3.0" value="1.0" step="0.1">
      </div>

      <div class="control-group">
        <label>Display Mode</label>
        <div class="chip-group">
          <button class="qc-chip display-chip on" data-mode="wavefunction">ψ(x, y)</button>
          <button class="qc-chip display-chip" data-mode="probability">|ψ|²</button>
        </div>
      </div>

      <div class="stat-item" style="border:none;padding:0;margin-top:8px">
        <span class="stat-label">Degeneracy</span>
        <span class="stat-value" id="degeneracy-val">—</span>
      </div>
    </div>
  </div>
</body>
</html>
