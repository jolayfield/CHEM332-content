<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bohr Model — QuantumChem</title>
  <script type="module" crossorigin src="./assets/bohr-DfPtSRyQ.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-DxoHAauW.js">
  <link rel="modulepreload" crossorigin href="./assets/theme-manager-DYMd5c2H.js">
  <link rel="stylesheet" crossorigin href="./assets/style-C8I79n8g.css">
</head>
<body>
  <div id="app">
    <nav class="main-nav sim-nav">
      <a class="nav-back" href="/simulations.html">‹ Back</a>
      <div class="nav-section byline">§ 4.1</div>
      <button class="nav-bookmark" aria-label="Bookmark">&#9734;</button>
    </nav>

    <div class="breadcrumb">
      <a href="./">Home</a><span class="sep">/</span>
      <a href="simulations.html">Simulations</a><span class="sep">/</span>
      <span class="current">Bohr Model</span>
    </div>

    <header class="page-header">
      <div class="eyebrow">Chapter 04 · Section 4.1</div>
      <h1>The Bohr Model of the <i>Atom.</i></h1>
    </header>

    <div class="fig-caption">Figure 4.1 · Interactive</div>
    <div class="sim-canvas-wrap dark">
      <canvas id="bohr-canvas"></canvas>
    </div>

    <div class="readouts">
      <div>
        <div class="k">ΔE</div>
        <div class="v" id="delta-e">1.89<span class="unit">eV</span></div>
      </div>
      <div>
        <div class="k">Photon λ</div>
        <div class="v" id="photon-wl">656<span class="unit">nm</span></div>
      </div>
      <div>
        <div class="k">Series</div>
        <div class="v" id="series-name" style="font-size:16px;padding-top:2px">Balmer</div>
      </div>
    </div>

    <div class="control-panel">
      <div class="control-group">
        <div class="control-row">
          <label for="initial-n">Initial Level (n<sub>i</sub>)</label>
          <span class="value-display" id="initial-n-val">n = 3</span>
        </div>
        <input type="range" id="initial-n" class="qc-slider" min="1" max="6" value="3" step="1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="final-n">Final Level (n<sub>f</sub>)</label>
          <span class="value-display" id="final-n-val">n = 2</span>
        </div>
        <input type="range" id="final-n" class="qc-slider" min="1" max="6" value="2" step="1">
      </div>

      <div class="control-group">
        <button id="transition-btn" class="qc-chip" style="width:100%">Trigger Transition</button>
      </div>
    </div>

    <div class="fig-caption">Figure 4.2 · Energy Level Diagram</div>
    <div class="graph-wrap">
      <div class="chart-container">
        <canvas id="energy-level-canvas"></canvas>
      </div>
    </div>
  </div>
</body>
</html>
