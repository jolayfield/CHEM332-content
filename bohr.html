<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bohr Model of the Atom</title>
        rel="stylesheet">

</head>

<body>
    <div id="app">
        <nav class="main-nav glass-panel">
            <div class="nav-brand">
        <svg class="brand-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
          <defs>
            <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="70" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          <circle cx="100" cy="100" r="50" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          <circle cx="170" cy="100" r="4" fill="currentColor"/>
          <circle cx="30" cy="100" r="4" fill="currentColor"/>
          <circle cx="100" cy="100" r="10" fill="currentColor"/>
        </svg>
        <span class="brand-text">QuantumChem</span>
      </div>
            <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>
        </svg>
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5" fill="currentColor"/>
          <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6m-15.78 7.78l4.24-4.24m3.08-3.08l4.24-4.24" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
      </button>
      
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
                <li><a href="./">Home</a></li>                <li><a href="simulations.html" class="active">Simulations</a></li>
                <li><a href="#">Resources</a></li>
            </ul>
        </nav>

        <div class="breadcrumb">
            <a href="./">Home</a> &rsaquo; <a href="simulations.html">Simulations</a> <span>/</span> <span>Bohr
                Model</span>
        </div>

        <header class="page-header">
            <h1>Bohr Model of the Atom</h1>
        </header>

        <main class="dashboard">
            <aside class="controls-panel glass-panel">
                <div class="control-group">
                    <label for="initial-n">Initial Level (n<sub>i</sub>)</label>
                    <input type="range" id="initial-n" min="1" max="6" value="3" step="1">
                    <span class="value-display" id="initial-n-val">n = 3</span>
                </div>

                <div class="control-group">
                    <label for="final-n">Final Level (n<sub>f</sub>)</label>
                    <input type="range" id="final-n" min="1" max="6" value="2" step="1">
                    <span class="value-display" id="final-n-val">n = 2</span>
                </div>

                <div class="control-group">
                    <button id="transition-btn" class="glass-btn"
                        style="position:relative; top:0; right:0; width:100%;">Trigger Transition</button>
                </div>

                <div class="stats-group">
                    <div class="stat-item">
                        <span class="stat-label">Energy Difference (&Delta;E)</span>
                        <span class="stat-value" id="delta-e">1.89 eV</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Photon Wavelength</span>
                        <span class="stat-value" id="photon-wl">656 nm</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Spectral Series</span>
                        <span class="stat-value" id="series-name">Balmer</span>
                    </div>
                </div>
            </aside>

            <section class="simulation-container glass-panel">
                <canvas id="bohr-canvas"></canvas>
            </section>

            <section class="graph-panel glass-panel" style="display: flex; flex-direction: column;">
                <h3 style="margin-bottom: 1rem; color: var(--text-dim); font-size: 1rem;">Energy Level Diagram</h3>
                <canvas id="energy-level-canvas" style="flex:1; width: 100%;"></canvas>
            </section>

        </main>


    </div>
    <script type="module" src="/bohr.ts"></script>
    <script>
      document.querySelector('.hamburger').addEventListener('click', function () {
        var open = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!open));
        this.classList.toggle('is-open');
        document.querySelector('.nav-links').classList.toggle('nav-open');
      });
    </script>
</body>

</html>
