<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Photo Electric Effect</title>
</head>

<body>
  <div id="app">
    <nav class="main-nav glass-panel">
      <div class="nav-brand">
        <svg class="brand-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
          <defs>
            <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="70" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          <circle cx="100" cy="100" r="50" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
          <circle cx="170" cy="100" r="4" fill="currentColor"/>
          <circle cx="30" cy="100" r="4" fill="currentColor"/>
          <circle cx="100" cy="100" r="10" fill="currentColor"/>
        </svg>
        <span class="brand-text">QuantumChem</span>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">☰</button>
      <ul class="nav-links">
        <li><a href="./">Home</a></li>
        <li><a href="#">Lectures</a></li>
        <li><a href="simulations.html" class="active">Simulations</a></li>
        <li><a href="#">Resources</a></li>
      </ul>
    </nav>

    <div class="breadcrumb">
      <a href="./">Home</a> &rsaquo; <a href="simulations.html">Simulations</a> <span>/</span> <span>Photoelectric
        Effect</span>
    </div>

    <header class="page-header">
      <h1>The Photo Electric Effect</h1>
    </header>

    <main class="dashboard">
      <aside class="controls-panel glass-panel">
        <div class="control-group">
          <label for="intensity">Light Intensity</label>
          <input type="range" id="intensity" min="1" max="100" value="50">
          <span class="value-display" id="intensity-val">50%</span>
        </div>

        <div class="control-group">
          <label for="wavelength">Light Wavelength (Color)</label>
          <input type="range" id="wavelength" min="250" max="850" value="500" step="5">
          <div class="color-preview" id="color-preview"></div>
          <span class="value-display" id="wavelength-val">500 nm</span>
        </div>

        <div class="control-group">
          <label for="metal">Target Metal</label>
          <select id="metal">
            <option value="2.1">Cesium (2.1 eV)</option>
            <option value="2.3">Sodium (2.3 eV)</option>
            <option value="4.7">Copper (4.7 eV)</option>
            <option value="5.1">Gold (5.1 eV)</option>
          </select>
        </div>

        <div class="stats-group">
          <div class="stat-item">
            <span class="stat-label">Photon Energy</span>
            <span class="stat-value" id="photon-energy">0.00 eV</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Work Function</span>
            <span class="stat-value" id="work-function">2.10 eV</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Max. KE</span>
            <span class="stat-value" id="max-ke">0.00 eV</span>
          </div>
        </div>
      </aside>

      <section class="simulation-container glass-panel">
        <canvas id="sim-canvas"></canvas>

      </section>

      <section class="graph-panel glass-panel">
        <div class="graph-controls">
          <select id="graph-axis-select" class="glass-input">
            <option value="wavelength">Wavelength (nm)</option>
            <option value="frequency">Frequency (Hz)</option>
          </select>
          <button id="reset-graph-btn" class="glass-btn">Reset Graph</button>
        </div>
        <canvas id="ke-freq-chart"></canvas>
      </section>

    </main>


  </div>
  <script type="module" src="/photoelectric.ts"></script>
  <script>
    document.querySelector('.hamburger').addEventListener('click', function () {
      var open = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', String(!open));
      this.classList.toggle('is-open');
      document.querySelector('.nav-links').classList.toggle('nav-open');
    });
  </script>
</body>

</html>
