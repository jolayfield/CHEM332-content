<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atomic Orbitals — QuantumChem</title>
  <script type="module" crossorigin src="./assets/orbitals-CwDD6hAv.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-DxoHAauW.js">
  <link rel="modulepreload" crossorigin href="./assets/MarchingCubes-BMGvtNEp.js">
  <link rel="modulepreload" crossorigin href="./assets/auto-render-DwzWyz09.js">
  <link rel="stylesheet" crossorigin href="./assets/style-C8I79n8g.css">
</head>
<body>
  <div id="app">
    <nav class="main-nav sim-nav">
      <a class="nav-back" href="/simulations.html">‹ Back</a>
      <div class="nav-section byline">§ 4.2</div>
      <button class="nav-bookmark" aria-label="Bookmark">&#9734;</button>
    </nav>

    <div class="breadcrumb">
      <a href="./">Home</a><span class="sep">/</span>
      <a href="simulations.html">Simulations</a><span class="sep">/</span>
      <span class="current">Atomic Orbitals</span>
    </div>

    <header class="page-header">
      <div class="eyebrow">Chapter 04 · Section 4.2</div>
      <h1>3D Atomic <i>Orbitals.</i></h1>
    </header>

    <div class="fig-caption">Figure 4.3 · Probability Density |ψ|²</div>
    <div class="sim-canvas-wrap dark" id="canvas-container" style="position:relative">
      <div class="three-wrap">
        <div id="three-container"></div>
      </div>
      <div id="loading-overlay">Rendering…</div>
    </div>

    <div class="readouts">
      <div>
        <div class="k">Orbital</div>
        <div class="v" id="orbital-name" style="font-size:20px;padding-top:2px">2p</div>
      </div>
      <div>
        <div class="k">Mode</div>
        <div class="v" id="viz-mode-label" style="font-size:14px;padding-top:4px">Scatter</div>
      </div>
      <div>
        <div class="k">Z</div>
        <div class="v" id="val-z" style="font-size:20px;padding-top:2px">1</div>
      </div>
    </div>

    <div class="control-panel">
      <div class="control-group">
        <div class="control-row">
          <label for="param-n">Principal (n)</label>
          <span class="value-display" id="val-n">2</span>
        </div>
        <input type="range" id="param-n" class="qc-slider" min="1" max="4" value="2" step="1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="param-l">Angular (l)</label>
          <span class="value-display" id="val-l">1</span>
        </div>
        <input type="range" id="param-l" class="qc-slider" min="0" max="1" value="1" step="1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="param-ml">Magnetic (m<sub>l</sub>)</label>
          <span class="value-display" id="val-ml">0</span>
        </div>
        <input type="range" id="param-ml" class="qc-slider" min="-1" max="1" value="0" step="1">
      </div>

      <div class="control-group">
        <div class="control-row">
          <label for="param-z">Atomic Number (Z)</label>
          <span class="value-display" id="val-z-ctrl">1 — H</span>
        </div>
        <input type="range" id="param-z" class="qc-slider" min="1" max="10" value="1" step="1">
      </div>

      <div class="control-group">
        <label>Visualization Mode</label>
        <div class="chip-group">
          <button id="toggle-scatter" class="qc-chip on">Scatter</button>
          <button id="toggle-surface" class="qc-chip">90% Surface</button>
        </div>
      </div>

      <div class="control-group">
        <label>Phase</label>
        <div class="phase-legend">
          <span><span class="phase-dot" style="background:#6699ff"></span>Positive (+)</span>
          <span><span class="phase-dot" style="background:#ff6666"></span>Negative (−)</span>
        </div>
      </div>

      <button id="reset-camera" class="btn-outline" style="width:100%;margin-top:8px">Reset View</button>
    </div>
  </div>
</body>
</html>
