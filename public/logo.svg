<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#340E51;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#982EB4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbital paths -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#340E51" stroke-width="1.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#340E51" stroke-width="1.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#340E51" stroke-width="1.5" opacity="0.3"/>

  <!-- Orbital rotation effect paths (slightly rotated) -->
  <ellipse cx="100" cy="100" rx="65" ry="50" fill="none" stroke="#982EB4" stroke-width="1" opacity="0.2" transform="rotate(45 100 100)"/>

  <!-- Electrons on outer orbital -->
  <circle cx="170" cy="100" r="4" fill="#982EB4" filter="url(#glow)"/>
  <circle cx="30" cy="100" r="4" fill="#982EB4" filter="url(#glow)"/>
  <circle cx="100" cy="30" r="4" fill="#982EB4" filter="url(#glow)"/>

  <!-- Electrons on middle orbital -->
  <circle cx="135" cy="135" r="3.5" fill="#982EB4" filter="url(#glow)" opacity="0.9"/>
  <circle cx="65" cy="65" r="3.5" fill="#982EB4" filter="url(#glow)" opacity="0.9"/>

  <!-- Nucleus (center) -->
  <circle cx="100" cy="100" r="10" fill="url(#atomGradient)" filter="url(#glow)"/>

  <!-- Inner nucleus glow -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#982EB4" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="100" r="6" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
</svg>
