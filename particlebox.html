<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle in a Box — QuantumChem</title>
  <script type="module" crossorigin src="./assets/particlebox-B3YLahUX.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/style-Bhy3gBjx.js">
  <link rel="modulepreload" crossorigin href="./assets/theme-manager-DYMd5c2H.js">
  <link rel="stylesheet" crossorigin href="./assets/style-D-yxDhwo.css">
</head>
<body>
  <div id="app">
    <nav class="main-nav sim-nav">
      <a class="nav-back" href="/simulations.html">‹ Back</a>
      <div class="nav-section byline">§ 2.1</div>
      <button class="nav-bookmark" aria-label="Bookmark">&#9734;</button>
    </nav>

    <div class="breadcrumb">
      <a href="./">Home</a><span class="sep">/</span>
      <a href="simulations.html">Simulations</a><span class="sep">/</span>
      <span class="current">Particle in a Box</span>
    </div>

    <header class="page-header">
      <div class="eyebrow">Chapter 02 · Section 2.1</div>
      <h1>Particle in a <i>Box.</i></h1>
    </header>

    <div class="fig-caption">Figure 2.1 · Wave Function</div>
    <div class="sim-canvas-wrap">
      <canvas id="pbox-canvas"></canvas>
    </div>

    <div class="readouts">
      <div>
        <div class="k">Energy E<sub>n</sub></div>
        <div class="v" id="energy-val">1 E₁</div>
      </div>
      <div>
        <div class="k">Nodes</div>
        <div class="v" id="nodes-val">0</div>
      </div>
      <div>
        <div class="k">Wavelength λ</div>
        <div class="v" id="wavelength-val">2L</div>
      </div>
    </div>

    <div class="control-panel">
      <div class="control-group">
        <div class="control-row">
          <label for="quantum-n">Quantum Number (n)</label>
          <span class="value-display" id="quantum-n-val">n = 1</span>
        </div>
        <input type="range" id="quantum-n" class="qc-slider" min="1" max="8" value="1" step="1">
      </div>

      <div class="control-group">
        <label>Display Mode</label>
        <div class="chip-group">
          <button class="qc-chip display-chip on" data-mode="wavefunction">ψ(x, t)</button>
          <button class="qc-chip display-chip" data-mode="probability">|ψ|²</button>
        </div>
      </div>

      <div class="control-group">
        <label>Superposition</label>
        <div style="display:flex;gap:8px;margin-top:6px">
          <button id="add-state" class="qc-chip" style="flex:1">Add n to Superposition</button>
          <button id="clear-states" class="qc-chip">Clear</button>
        </div>
        <div id="coefficients-container" style="margin-top:10px;overflow-x:auto">
          <table class="coefficients-table">
            <thead>
              <tr>
                <th>n</th>
                <th>Coeff (c<sub>n</sub>)</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="coefficients-body"></tbody>
          </table>
        </div>
      </div>

      <div class="control-group">
        <label>Animation</label>
        <div style="display:flex;gap:8px;margin-top:6px">
          <button id="toggle-animate" class="qc-chip" style="flex:1">Animate Wavefunction</button>
          <button id="reset-animate" class="qc-chip">Reset</button>
        </div>
        <div style="margin-top:12px">
          <div class="control-row">
            <label for="animation-speed">Animation Speed</label>
            <span class="value-display" id="speed-val">1.0×</span>
          </div>
          <input type="range" id="animation-speed" class="qc-slider" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
      </div>

      <p style="font-size:13px;color:var(--ink-2)">
        Also explore: <a href="particlebox2d.html" style="color:var(--accent)">2D version →</a>
      </p>
    </div>

    <div class="fig-caption">Figure 2.2 · Energy Level Diagram</div>
    <div class="graph-wrap">
      <div class="chart-container">
        <canvas id="energy-level-canvas"></canvas>
      </div>
    </div>
  </div>
</body>
</html>
